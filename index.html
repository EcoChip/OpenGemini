<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenGemini by ecochip</title>
    <style>
        :root {
            --bg-color: #131314;
            --sidebar-bg: #1e1f20;
            --text-color: #e3e3e3;
            --user-msg: #004a77;
            --bot-msg: #1e1f20;
            --input-bg: #2b2c2f;
            --accent: #a8c7fa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 260px; background-color: var(--sidebar-bg); display: flex; flex-direction: column; padding: 20px; transition: 0.3s; }
        .logo { font-size: 20px; font-weight: bold; color: var(--accent); margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .btn-new { background: var(--input-bg); color: white; border: 1px solid #444; padding: 12px; border-radius: 8px; cursor: pointer; text-align: left; font-size: 14px; margin-bottom: auto; transition: 0.2s; }
        .btn-new:hover { background: #3c3d40; }
        .sidebar-bottom { display: flex; flex-direction: column; gap: 10px; }
        .btn-credits { background: transparent; color: #aaa; border: none; cursor: pointer; text-align: left; padding: 10px 0; font-size: 14px; }
        .btn-credits:hover { color: white; }

        /* Main Chat Area */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        .chat-container { flex: 1; overflow-y: auto; padding: 40px 10%; display: flex; flex-direction: column; gap: 20px; scroll-behavior: smooth; }
        
        .message { max-width: 80%; line-height: 1.6; padding: 15px 20px; border-radius: 12px; font-size: 15px; word-wrap: break-word; }
        .message.user { align-self: flex-end; background-color: var(--user-msg); border-bottom-right-radius: 4px; }
        .message.bot { align-self: flex-start; background-color: var(--bot-msg); border-bottom-left-radius: 4px; border: 1px solid #333; }

        /* Input Area */
        .input-container { padding: 20px 10%; background: linear-gradient(180deg, transparent, var(--bg-color) 20%); }
        .input-box { display: flex; background-color: var(--input-bg); border-radius: 24px; padding: 10px 20px; align-items: center; gap: 10px; border: 1px solid #444; }
        .input-box input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; padding: 10px 0; }
        .input-box button { background: transparent; border: none; color: var(--accent); cursor: pointer; font-size: 16px; font-weight: bold; padding: 10px; border-radius: 50%; }
        .input-box button:hover { background: #3c3d40; }

        /* Modal Créditos */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--sidebar-bg); padding: 30px; border-radius: 12px; width: 300px; text-align: center; border: 1px solid #444; }
        .modal-content h3 { color: var(--accent); margin-bottom: 15px; }
        .modal-content p { margin: 10px 0; font-size: 14px; color: #ccc; }
        .close-btn { margin-top: 20px; background: var(--accent); color: #000; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Loading Animation */
        .typing { display: none; align-self: flex-start; color: #aaa; font-style: italic; font-size: 14px; padding: 0 20px; }

        @media (max-width: 768px) {
            .sidebar { width: 60px; padding: 10px; }
            .sidebar span, .sidebar-bottom { display: none; }
            .logo::after { content: "✨"; font-size: 24px; }
            .chat-container { padding: 20px 5%; }
            .input-container { padding: 15px 5%; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><span>OpenGemini</span></div>
        <button class="btn-new" onclick="clearChat()">+ Nuevo Chat</button>
        
        <div class="sidebar-bottom">
            <button class="btn-credits" onclick="document.getElementById('creditsModal').style.display='flex'">ℹ️ Créditos</button>
        </div>
    </div>

    <div class="main-content">
        <div class="chat-container" id="chatBox">
            </div>
        <div class="typing" id="typingIndicator">OpenGemini está escribiendo...</div>
        
        <div class="input-container">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Escribe tu prompt aquí..." onkeypress="handleEnter(event)">
                <button onclick="sendMessage()">Enviar</button>
            </div>
        </div>
    </div>

    <div class="modal" id="creditsModal">
        <div class="modal-content">
            <h3>Créditos</h3>
            <p><strong>Programación:</strong> Gemini</p>
            <p><strong>API:</strong> Google Gemini 1.5</p>
            <p><strong>Empresa:</strong> ecochip</p>
            <button class="close-btn" onclick="document.getElementById('creditsModal').style.display='none'">Cerrar</button>
        </div>
    </div>

    <script>
        // TU API KEY DIRECTA
        const API_KEY = "AIzaSyDVE_zXSfwo5B-RGna9iqwPzp4xnwLvfks";
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');

        // Cargar historial al inicio
        let chatHistory = JSON.parse(localStorage.getItem('opengemini_history')) || [];
        
        window.onload = () => {
            if (chatHistory.length === 0) {
                addMessageToUI("bot", "¡Hola! Soy OpenGemini, desarrollado por ecochip. ¿En qué te puedo ayudar hoy?");
            } else {
                chatHistory.forEach(msg => addMessageToUI(msg.role, msg.text, false));
            }
        };

        function handleEnter(event) {
            if (event.key === 'Enter') sendMessage();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Mostrar mensaje del usuario
            addMessageToUI("user", text);
            saveToHistory("user", text);
            userInput.value = '';
            
            // Mostrar "Escribiendo..."
            typingIndicator.style.display = 'block';
            chatBox.scrollTop = chatBox.scrollHeight;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                    contents: [{ parts: [{ text: text }] }] 
                    })
                });
                const data = await response.json();
                let botReply = "Lo siento, ha habido un error en la Matrix.";
                
                if (data.candidates && data.candidates.length > 0) {
                    botReply = data.candidates[0].content.parts[0].text;
                }

                typingIndicator.style.display = 'none';
                addMessageToUI("bot", botReply);
                saveToHistory("bot", botReply);

            } catch (error) {
                typingIndicator.style.display = 'none';
                addMessageToUI("bot", "⚠️ Error de conexión. Revisa el Wi-Fi o la API Key.");
            }
        }

        function addMessageToUI(role, text, animate = true) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', role);
            // Reemplazar saltos de línea por <br> para que se lea bien
            msgDiv.innerHTML = text.replace(/\n/g, '<br>');
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function saveToHistory(role, text) {
            chatHistory.push({ role, text });
            localStorage.setItem('opengemini_history', JSON.stringify(chatHistory));
        }

        function clearChat() {
            if(confirm("¿Seguro que quieres borrar el historial actual?")) {
                localStorage.removeItem('opengemini_history');
                chatHistory = [];
                chatBox.innerHTML = '';
                addMessageToUI("bot", "¡Hola! Soy OpenGemini, desarrollado por ecochip. ¿En qué te puedo ayudar hoy?");
            }
        }
    </script>
</body>
</html>
